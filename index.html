<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>thumb-up-on-canvas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Zoomable world container -->
  <div id="viewport">
    <div id="world"></div>
  </div>

  <!-- Scan overlay (fixed over viewport) -->
  <div id="scan-overlay" class="hidden">
    <div id="scan-frame">
      <span class="c tl"></span>
      <span class="c tr"></span>
      <span class="c bl"></span>
      <span class="c br"></span>
    </div>
    <div id="scan-line"></div>
  </div>

  <!-- Initial prompt -->
  <div id="initial-prompt">
    <p id="prompt-question">Do you like this website?</p>
    <button id="btn-like">Like</button>
  </div>

  <!-- Floating notification (instruction / status) -->
  <div id="notification" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
