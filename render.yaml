services:
  - type: web
    name: thumb-up-on-canvas
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: thumb-up-postgres
          property: connectionString
      # Set these manually in Render dashboard to enable the postcard email feature
      - key: SITE_URL
        value: https://thumb-up-on-canvas.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

databases:
  - name: thumb-up-postgres
    databaseName: thumbs
    user: thumbs
    plan: free
