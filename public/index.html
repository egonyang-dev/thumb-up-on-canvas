<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>thumb-up-on-canvas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Zoomable world -->
  <div id="viewport">
    <div id="world"></div>
  </div>

  <!-- Scan overlay -->
  <div id="scan-overlay" class="hidden">
    <div id="scan-frame">
      <span class="c tl"></span>
      <span class="c tr"></span>
      <span class="c bl"></span>
      <span class="c br"></span>
      <!-- Drawing canvas lives inside the frame bounds -->
      <canvas id="draw-canvas" width="110" height="150"></canvas>
    </div>
    <div id="scan-line"></div>
  </div>

  <!-- Initial prompt -->
  <div id="initial-prompt">
    <p id="prompt-question">Do you like this website?</p>
    <button id="btn-like">Like</button>
  </div>

  <!-- Share / download panel -->
  <div id="share-panel" class="hidden">
    <p class="share-label">Saved.</p>
    <input
      id="ig-handle"
      type="text"
      placeholder="@instagram (optional)"
      maxlength="60"
      autocomplete="off"
      spellcheck="false"
    >
    <button id="btn-download">Download image</button>
    <button id="btn-dismiss-share" aria-label="close">×</button>
  </div>

  <!-- Floating notification -->
  <div id="notification" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
