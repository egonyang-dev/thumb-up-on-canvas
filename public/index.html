<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>thumb-up-on-canvas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Zoomable world -->
  <div id="viewport">
    <div id="world"></div>
  </div>

  <!-- Scan overlay -->
  <div id="scan-overlay" class="hidden">
    <div id="scan-frame">
      <span class="c tl"></span>
      <span class="c tr"></span>
      <span class="c bl"></span>
      <span class="c br"></span>
      <!-- Drawing canvas lives inside the frame bounds -->
      <canvas id="draw-canvas" width="110" height="150"></canvas>
    </div>
    <div id="scan-line"></div>
  </div>

  <!-- Initial prompt -->
  <div id="initial-prompt">
    <p id="prompt-question">Do you like this website?</p>
    <button id="btn-like">Like</button>
  </div>

  <!-- Share / download panel -->
  <div id="share-panel" class="hidden">
    <button id="btn-dismiss-share" aria-label="close">×</button>
    <p class="share-label">Saved.</p>

    <!-- Text presets (injected by JS) -->
    <div id="text-presets"></div>

    <!-- Style row -->
    <div id="style-row">
      <div id="color-swatches">
        <button class="swatch active" data-color="black" title="Black"></button>
        <button class="swatch" data-color="blue"  title="Blue"></button>
        <button class="swatch" data-color="gray"  title="Gray"></button>
      </div>
      <div id="font-btns">
        <button class="font-btn active" data-font="mono">Mono</button>
        <button class="font-btn" data-font="sans">Sans</button>
      </div>
    </div>

    <input
      id="ig-handle"
      type="text"
      placeholder="@instagram (optional)"
      maxlength="60"
      autocomplete="off"
      spellcheck="false"
    >

    <div id="share-actions">
      <button id="btn-share">Share / ins.</button>
      <button id="btn-open-postcard">Postcard</button>
    </div>
    <button id="btn-download">download</button>
    <p id="share-status"></p>
  </div>

  <!-- Postcard panel -->
  <div id="postcard-panel" class="hidden">
    <button id="btn-back-postcard" aria-label="back">←</button>
    <button id="btn-dismiss-postcard" aria-label="close">×</button>
    <p class="share-label">Send to the next person.</p>
    <input id="pc-to"   type="email" placeholder="your email"   maxlength="120" autocomplete="off" spellcheck="false">
    <input id="pc-name" type="text"  placeholder="your name"    maxlength="60"  autocomplete="off" spellcheck="false">
    <input id="pc-city" type="text"  placeholder="city"         maxlength="60"  autocomplete="off" spellcheck="false">
    <textarea id="pc-msg" placeholder="message" maxlength="160" rows="3" spellcheck="false"></textarea>
    <div id="pc-actions">
      <button id="btn-send-postcard">Send</button>
    </div>
    <p id="pc-status"></p>
  </div>

  <!-- Floating notification -->
  <div id="notification" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
